services:
  - type: web
    name: water-project-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: CLOUD_DEPLOY
        value: "1"
      - key: MQTT_BROKER
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_TOPIC
        value: waterproject/alexl/station/data
      - key: PYTHON_VERSION
        value: "3.11.9"
